<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sethchat</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <form id="loginForm">
        <h1>sethchat</h1>
        <p>Communications on this platform are not yet end-to-end encrypted. Communicate with caution.</p>
        <p id="loginError" class="hidden"></p>
        <div class="field">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" required autocomplete="off">
        </div>
        <div class="field">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required autocomplete="current-password">
        </div>
        <div class="field">
            <label for="room">Room</label>
            <input type="text" id="room" name="room" required autocomplete="off">
        </div>
        <button type="submit">Connect →</button>
        <p style="font-size:0.78rem; color:var(--subtle); text-align:center; margin-top:0.5rem">
            No account? <a href="#" id="toggleRegister" style="color:var(--accent)">Register</a>
        </p>
    </form>

    <div id="chatContainer" class="hidden">
        <div id="chatHeader">
            <span class="hash">#</span>
            <span class="room-name" id="headerRoom"></span>
            <span class="connected-as" id="headerUser"></span>
        </div>
        <div id="messageList"></div>
        <div id="inputBar">
            <input type="text" id="messageInput" placeholder="Message...">
            <button id="sendButton">Send</button>
        </div>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
