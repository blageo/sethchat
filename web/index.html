<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sethchat</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <form id="loginForm">
        <h1>sethchat</h1>
        <p>All messages are end-to-end encrypted. Keys are stored locally in your browser.</p>
        <p id="loginError" class="hidden"></p>
        <div class="field">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" required autocomplete="off">
        </div>
        <div class="field">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required autocomplete="current-password">
        </div>
        <button type="submit">Connect →</button>
        <p style="font-size:0.78rem; color:var(--subtle); text-align:center; margin-top:0.5rem">
            No account? <a href="#" id="toggleRegister" style="color:var(--accent)">Register</a>
        </p>
    </form>

    <div id="chatContainer" class="hidden">

        <aside id="sidebar">
            <div id="sidebarHeader">
                <div id="squadName"></div>
                <div id="sidebarUser">
                    <span id="headerUser"></span>
                    <span id="userRoleBadge"></span>
                </div>
                <div id="sidebarActions">
                    <button id="membersButton" title="Members">&#128101;</button>
                    <button id="settingsButton" title="Squad Settings" class="hidden">&#9881;</button>
                </div>
            </div>
            <nav id="roomList"></nav>
            <div id="dmSection">
                <div id="dmHeader">
                    <span>Direct Messages</span>
                    <button id="newDMButton" title="New DM">+</button>
                </div>
                <nav id="dmList"></nav>
            </div>
            <div id="addRoomBar">
                <input type="text" id="addRoomInput" placeholder="join a room...">
                <button id="addRoomButton">+</button>
            </div>
        </aside>

        <div id="chatMain">
            <div id="chatHeader">
                <span class="hash">#</span>
                <span class="room-name" id="headerRoom"></span>
            </div>
            <div id="messageList"></div>
            <div id="pendingMedia" class="hidden">
                <span id="pendingMediaName"></span>
                <button id="clearMediaButton">✕</button>
            </div>
            <div id="inputBar">
                <input type="file" id="fileInput" accept="image/*,video/*" style="display:none">
                <button id="attachButton" type="button" title="Attach media">&#128206;</button>
                <input type="text" id="messageInput" placeholder="Message...">
                <button id="sendButton">Send</button>
            </div>
        </div>

    </div>

    <div id="modalOverlay" class="hidden">
        <div id="modal">
            <div id="modalHeader">
                <span id="modalTitle"></span>
                <button id="modalClose">✕</button>
            </div>
            <div id="modalBody"></div>
        </div>
    </div>

    <script src="js/crypto.js"></script>
    <script src="js/script.js"></script>
</body>
</html>
